name: Build VSIX

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-vsix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile, test, and package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint sources
        run: npm run lint

      - name: Compile extension
        run: npm run compile

      - name: Run image logic tests
        run: npm run test:logic

      - name: Package VSIX
        id: package
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          VSIX="image-watch-vscode-${VERSION}.vsix"
          ./node_modules/.bin/vsce package --no-dependencies --out "${VSIX}"
          test -s "${VSIX}"
          echo "vsix=${VSIX}" >> "${GITHUB_OUTPUT}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.vsix }}
          path: ${{ steps.package.outputs.vsix }}
          if-no-files-found: error
          retention-days: 14
