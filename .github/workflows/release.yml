name: Release VSIX

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Verify and upload VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint sources
        run: npm run lint

      - name: Compile extension
        run: npm run compile

      - name: Run image logic tests
        run: npm run test:logic

      - name: Validate version and package VSIX
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${RELEASE_TAG#v}" != "${VERSION}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${VERSION}." >&2
            exit 1
          fi

          VSIX="image-watch-vscode-${VERSION}.vsix"
          ./node_modules/.bin/vsce package --no-dependencies --out "${VSIX}"
          test -s "${VSIX}"
          echo "vsix=${VSIX}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.vsix }}
          path: ${{ steps.package.outputs.vsix }}
          if-no-files-found: error

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VSIX: ${{ steps.package.outputs.vsix }}
        run: gh release upload "${RELEASE_TAG}" "${VSIX}" --clobber
